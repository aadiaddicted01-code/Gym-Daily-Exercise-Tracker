function MuscleDiagram({group,size=42}){
  const hi=C.primary,hi2=C.accent,dim="#222",line="#2E2E2E";
  const parts=[
    ["head","circle",{cx:20,cy:7,r:6.5},[]],
    ["neck","rect",{x:17.5,y:12.5,w:5,h:4,rx:2},[]],
    ["trap-l","ellipse",{cx:8,cy:18,rx:6,ry:4.5},["Back","Shoulders"]],
    ["trap-r","ellipse",{cx:32,cy:18,rx:6,ry:4.5},["Back","Shoulders"]],
    ["chest","rect",{x:11,y:16,w:18,h:12,rx:4},["Chest"]],
    ["sho-l","circle",{cx:5,cy:20,r:4.5},["Shoulders"]],
    ["sho-r","circle",{cx:35,cy:20,r:4.5},["Shoulders"]],
    ["bic-l","rect",{x:1,y:24,w:6,h:11,rx:3},["Biceps"]],
    ["bic-r","rect",{x:33,y:24,w:6,h:11,rx:3},["Biceps"]],
    ["tri-l","rect",{x:0,y:24,w:5,h:11,rx:3},["Triceps"]],
    ["tri-r","rect",{x:35,y:24,w:5,h:11,rx:3},["Triceps"]],
    ["fore-l","rect",{x:0,y:35,w:5,h:9,rx:3},["Forearms"]],
    ["fore-r","rect",{x:35,y:35,w:5,h:9,rx:3},["Forearms"]],
    ["abs","rect",{x:13,y:28,w:14,h:12,rx:4},["Core & Abs"]],
    ["obl-l","rect",{x:9,y:28,w:5,h:10,rx:2},["Core & Abs"]],
    ["obl-r","rect",{x:26,y:28,w:5,h:10,rx:2},["Core & Abs"]],
    ["hip","rect",{x:10,y:40,w:20,h:8,rx:4},["Glutes"]],
    ["quad-l","rect",{x:10,y:48,w:9,h:14,rx:4},["Quads","Hamstrings"]],
    ["quad-r","rect",{x:21,y:48,w:9,h:14,rx:4},["Quads","Hamstrings"]],
    ["calf-l","rect",{x:11,y:62,w:7,h:10,rx:3},["Calves"]],
    ["calf-r","rect",{x:22,y:62,w:7,h:10,rx:3},["Calves"]],
  ];
  const fullGroups=["Chest","Back","Shoulders","Biceps","Triceps","Quads","Core & Abs","Glutes","Calves"];
  return(
    <svg width={size} height={size*1.75} viewBox="0 0 40 74" style={{flexShrink:0}}>
      {parts.map(([id,type,p,groups])=>{
        const isHi=groups.includes(group)||(group==="Full Body"&&fullGroups.some(g=>groups.includes(g)));
        const f=isHi?hi:dim,str=isHi?hi2:line,sw=isHi?0.8:0.4;
        if(type==="circle") return <circle key={id} cx={p.cx} cy={p.cy} r={p.r} fill={f} stroke={str} strokeWidth={sw}/>;
        if(type==="ellipse") return <ellipse key={id} cx={p.cx} cy={p.cy} rx={p.rx} ry={p.ry} fill={f} stroke={str} strokeWidth={sw}/>;
        return <rect key={id} x={p.x} y={p.y} width={p.w} height={p.h} rx={p.rx} fill={f} stroke={str} strokeWidth={sw}/>;
      })}
    </svg>
  );
}

// ── Data helpers ─────────────────────────────────────────
function loadData(){
  try{
    const v=localStorage.getItem(STORAGE_KEY);
    return v?JSON.parse(v):{workouts:{},metrics:[],goals:{}};
  }catch{return{workouts:{},metrics:[],goals:{}};}
}
function saveData(d){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}
}

// ── Exercise Picker ──────────────────────────────────────
function ExercisePicker({onSelect,onClose}){
  const [group,setGroup]=useState("Chest");
  const [search,setSearch]=useState("");
  const filtered=EX.filter(e=>e.g===group&&(!search||e.n.toLowerCase().includes(search.toLowerCase())));
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:100,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px",display:"flex",gap:8,alignItems:"center"}}>
        <input style={{...inp,flex:1}} placeholder="Search exercises..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
        <button style={{...btn(C.card2,C.text),padding:"9px 14px"}} onClick={onClose}>✕</button>
      </div>
      <div style={{display:"flex",overflowX:"auto",gap:8,padding:"0 16px 12px",flexShrink:0}}>
        {GROUPS.map(g=>(
          <button key={g} onClick={()=>{setGroup(g);setSearch("");}}
            style={{...btn(g===group?C.primary:C.card2,g===group?"#000":C.text),whiteSpace:"nowrap",padding:"7px 12px",fontSize:12}}>
            {g}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
        {filtered.map(ex=>(
          <div key={ex.id} onClick={()=>onSelect(ex)}
            style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",marginBottom:8,cursor:"pointer",display:"flex",gap:12,alignItems:"center"}}>
            <MuscleDiagram group={ex.g} size={36}/>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text}}>{ex.n}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ex.eq} · {ex.tp}</div>
              <div style={{fontSize:11,color:C.soft,marginTop:3,lineHeight:1.4}}>{ex.desc}</div>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,marginTop:40}}>No exercises found</div>}
      </div>
    </div>
  );
}

// ── Workout Tab ──────────────────────────────────────────
function WorkoutTab({data,setData}){
  const [showPicker,setShowPicker]=useState(false);
  const todayKey=today();
  const workout=data.workouts[todayKey]||{exercises:[]};

  function addExercise(ex){
    const updated={...data};
    if(!updated.workouts[todayKey]) updated.workouts[todayKey]={date:todayKey,exercises:[]};
    updated.workouts[todayKey].exercises.push({id:Date.now(),exId:ex.id,name:ex.n,group:ex.g,sets:[{weight:"",reps:""}]});
    setData(updated);
    setShowPicker(false);
  }
  function addSet(exIdx){
    const updated={...data};
    updated.workouts[todayKey].exercises[exIdx].sets.push({weight:"",reps:""});
    setData(updated);
  }
  function removeSet(exIdx,setIdx){
    const updated={...data};
    const sets=updated.workouts[todayKey].exercises[exIdx].sets;
    if(sets.length>1) sets.splice(setIdx,1);
    setData(updated);
  }
  function updateSet(exIdx,setIdx,field,val){
    const updated={...data};
    updated.workouts[todayKey].exercises[exIdx].sets[setIdx][field]=val;
    setData(updated);
  }
  function removeExercise(exIdx){
    const updated={...data};
    updated.workouts[todayKey].exercises.splice(exIdx,1);
    setData(updated);
  }

  return(
    <div style={{padding:"16px",paddingBottom:80}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:C.primary}}>Today's Workout</div>
          <div style={{fontSize:12,color:C.muted}}>{fmtDate(todayKey)}</div>
        </div>
        <button style={btn(C.primary)} onClick={()=>setShowPicker(true)}>+ Add Exercise</button>
      </div>

      {workout.exercises.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:12}}>🏋️</div>
          <div style={{fontSize:16,color:C.soft}}>No exercises yet</div>
          <div style={{fontSize:13,marginTop:6}}>Tap "+ Add Exercise" to start</div>
        </div>
      )}

      {workout.exercises.map((ex,exIdx)=>(
        <div key={ex.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <MuscleDiagram group={ex.group} size={32}/>
              <div>
                <div style={{fontSize:14,fontWeight:600}}>{ex.name}</div>
                <div style={{fontSize:11,color:C.muted}}>{ex.group}</div>
              </div>
            </div>
            <button style={{background:"none",border:"none",color:C.muted,fontSize:16,cursor:"pointer"}} onClick={()=>removeExercise(exIdx)}>✕</button>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 32px",gap:6,marginBottom:6}}>
            <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>Set</div>
            <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>kg</div>
            <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>Reps</div>
            <div/>
          </div>
          {ex.sets.map((s,sIdx)=>(
            <div key={sIdx} style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 32px",gap:6,marginBottom:6,alignItems:"center"}}>
              <div style={{textAlign:"center",fontSize:13,color:C.muted,fontWeight:600}}>{sIdx+1}</div>
              <input type="number" style={inp} placeholder="0" value={s.weight} onChange={e=>updateSet(exIdx,sIdx,"weight",e.target.value)}/>
              <input type="number" style={inp} placeholder="0" value={s.reps} onChange={e=>updateSet(exIdx,sIdx,"reps",e.target.value)}/>
              <button style={{background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer"}} onClick={()=>removeSet(exIdx,sIdx)}>−</button>
            </div>
          ))}
          <button style={{...btn(C.card2,C.muted),width:"100%",marginTop:4,fontSize:12}} onClick={()=>addSet(exIdx)}>+ Add Set</button>
        </div>
      ))}

      {showPicker&&<ExercisePicker onSelect={addExercise} onClose={()=>setShowPicker(false)}/>}
    </div>
  );
}

// ── History Tab ──────────────────────────────────────────
function HistoryTab({data}){
  const workouts=Object.entries(data.workouts)
    .filter(([,w])=>w.exercises&&w.exercises.length>0)
    .sort(([a],[b])=>b.localeCompare(a));

  if(workouts.length===0){
    return(
      <div style={{textAlign:"center",padding:"80px 20px",color:C.muted}}>
        <div style={{fontSize:40,marginBottom:12}}>📋</div>
        <div style={{fontSize:16,color:C.soft}}>No workout history yet</div>
      </div>
    );
  }

  return(
    <div style={{padding:"16px",paddingBottom:80}}>
      <div style={{fontSize:20,fontWeight:700,color:C.primary,marginBottom:16}}>History</div>
      {workouts.map(([date,w])=>{
        const totalSets=w.exercises.reduce((a,e)=>a+e.sets.length,0);
        const groups=[...new Set(w.exercises.map(e=>e.group))];
        return(
          <div key={date} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontSize:14,fontWeight:600,color:C.primary}}>{fmtDate(date)}</div>
              <div style={{fontSize:12,color:C.muted}}>{w.exercises.length} exercises · {totalSets} sets</div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {groups.map(g=>(
                <span key={g} style={{background:C.card2,borderRadius:6,padding:"3px 8px",fontSize:11,color:C.soft}}>{g}</span>
              ))}
            </div>
            {w.exercises.map((ex,i)=>(
              <div key={i} style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:8}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{ex.name}</div>
                {ex.sets.map((s,si)=>(
                  <div key={si} style={{fontSize:12,color:C.muted}}>Set {si+1}: {s.weight||0}kg × {s.reps||0} reps</div>
                ))}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── Exercises Tab ────────────────────────────────────────
function ExercisesTab(){
  const [group,setGroup]=useState("Chest");
  const [search,setSearch]=useState("");
  const filtered=EX.filter(e=>(!group||e.g===group)&&(!search||e.n.toLowerCase().includes(search.toLowerCase())));
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 8px"}}>
        <div style={{fontSize:20,fontWeight:700,color:C.primary,marginBottom:12}}>Exercise Library</div>
        <input style={inp} placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{display:"flex",overflowX:"auto",gap:8,marginTop:10,paddingBottom:4}}>
          {GROUPS.map(g=>(
            <button key={g} onClick={()=>setGroup(g)}
              style={{...btn(g===group?C.primary:C.card2,g===group?"#000":C.text),whiteSpace:"nowrap",padding:"7px 12px",fontSize:11}}>
              {g}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 80px"}}>
        {filtered.map(ex=>(
          <div key={ex.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",marginBottom:8,display:"flex",gap:12,alignItems:"center"}}>
            <MuscleDiagram group={ex.g} size={36}/>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text}}>{ex.n}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ex.eq} · {ex.tp}</div>
              <div style={{fontSize:11,color:C.soft,marginTop:3,lineHeight:1.4}}>{ex.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Metrics Tab ──────────────────────────────────────────
function MetricsTab({data,setData}){
  const [weight,setWeight]=useState("");
  const [notes,setNotes]=useState("");

  function logMetric(){
    if(!weight) return;
    const updated={...data};
    if(!updated.metrics) updated.metrics=[];
    updated.metrics.push({date:today(),weight:parseFloat(weight),notes});
    setData(updated);
    setWeight("");setNotes("");
  }

  const metrics=(data.metrics||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));

  return(
    <div style={{padding:"16px",paddingBottom:80}}>
      <div style={{fontSize:20,fontWeight:700,color:C.primary,marginBottom:16}}>Body Metrics</div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Log Today</div>
        <input type="number" style={{...inp,marginBottom:8}} placeholder="Weight (kg)" value={weight} onChange={e=>setWeight(e.target.value)}/>
        <input style={{...inp,marginBottom:10}} placeholder="Notes (optional)" value={notes} onChange={e=>setNotes(e.target.value)}/>
        <button style={{...btn(C.primary),width:"100%"}} onClick={logMetric}>Save Entry</button>
      </div>
      {metrics.length===0&&(
        <div style={{textAlign:"center",padding:40,color:C.muted}}>No metrics logged yet</div>
      )}
      {metrics.map((m,i)=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:14,fontWeight:600}}>{fmtDate(m.date)}</div>
            {m.notes&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{m.notes}</div>}
          </div>
          <div style={{fontSize:20,fontWeight:700,color:C.primary}}>{m.weight} kg</div>
        </div>
      ))}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("workout");
  const [data,setDataRaw]=useState(loadData);

  function setData(d){
    setDataRaw(d);
    saveData(d);
  }

  const tabs=[
    {id:"workout",label:"Workout",icon:"🏋️"},
    {id:"history",label:"History",icon:"📋"},
    {id:"exercises",label:"Exercises",icon:"💪"},
    {id:"metrics",label:"Metrics",icon:"📊"},
  ];

  return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="workout"&&<WorkoutTab data={data} setData={setData}/>}
        {tab==="history"&&<HistoryTab data={data}/>}
        {tab==="exercises"&&<ExercisesTab/>}
        {tab==="metrics"&&<MetricsTab data={data} setData={setData}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,background:"none",border:"none",padding:"10px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={{fontSize:10,color:tab===t.id?C.primary:C.muted,fontWeight:tab===t.id?700:400}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
